<script>

/* ===================== */
/* BACKGROUND GRID */
/* ===================== */

const patternGroup = document.getElementById("patternGroup");

for (let i = 0; i < window.innerWidth; i += 80) {
    let line = document.createElementNS("http://www.w3.org/2000/svg", "line");
    line.setAttribute("x1", i);
    line.setAttribute("y1", 0);
    line.setAttribute("x2", i);
    line.setAttribute("y2", window.innerHeight);
    patternGroup.appendChild(line);
}

for (let i = 0; i < window.innerHeight; i += 80) {
    let line = document.createElementNS("http://www.w3.org/2000/svg", "line");
    line.setAttribute("x1", 0);
    line.setAttribute("y1", i);
    line.setAttribute("x2", window.innerWidth);
    line.setAttribute("y2", i);
    patternGroup.appendChild(line);
}

// Keep mouse and scroll offsets separate and combine them to avoid snapping
let pgOffsetX = 0;
let pgOffsetY = 0;
let pgScrollY = 0;

function setPatternTransform() {
    // combine mouse offsets and scroll offset
    const tx = pgOffsetX;
    const ty = pgOffsetY + pgScrollY;
    patternGroup.setAttribute("transform", `translate(${tx},${ty})`);
}

document.addEventListener("mousemove", e => {
    pgOffsetX = (e.clientX / window.innerWidth - 0.5) * 30;
    pgOffsetY = (e.clientY / window.innerHeight - 0.5) * 30;
    setPatternTransform();
});

window.addEventListener("scroll", () => {
    pgScrollY = window.scrollY * 0.05;
    setPatternTransform();
});

/* ===================== */
/* THEME */
/* ===================== */

function changeTheme(theme) {
    // remove any theme classes
    document.body.classList.remove("light", "green");
    if (theme === "light") document.body.classList.add("light");
    if (theme === "green") document.body.classList.add("green");
    // collapse dropdown after selection
    document.getElementById('themePanel').classList.remove('open');
}

function toggleThemePanel() {
    document.getElementById('themePanel').classList.toggle('open');
}

/* ===================== */
/* ACCESSIBILITY */
/* ===================== */

function toggleAccessibility() {
    const panel = document.getElementById("accessPanel");
    panel.classList.toggle('open');
}

function toggleClass(className) {
    document.body.classList.toggle(className);
}

function setHighlightColor(color) {
    const classes = ['highlight-yellow','highlight-lightgreen','highlight-darkgreen','highlight-purple','highlight-lightblue'];
    document.body.classList.remove(...classes);
    if (color) {
        document.body.classList.add('highlight-' + color);
    }
    // close panel
    document.getElementById('highlightPanel').classList.remove('open');
}

function toggleHighlightPanel() {
    document.getElementById('highlightPanel').classList.toggle('open');
}

function resetAccessibility() {
    document.body.classList.remove(
        "high-contrast",
        "large-text",
        "reduce-motion",
        "highlight-yellow",
        "highlight-lightgreen",
        "highlight-darkgreen",
        "highlight-purple",
        "highlight-lightblue"
    );
    const selector = document.getElementById('highlightColor');
    if(selector) selector.value = '';
}

/* ===================== */
/* SECTION ANIMATION */
/* ===================== */

// scroll indicators logic
const upIndicator = document.querySelector('.scroll-indicator.up');
const downIndicator = document.querySelector('.scroll-indicator.down');

function updateScrollIndicators() {
    const atTop = window.scrollY <= 0;
    const atBottom = window.innerHeight + window.scrollY >= document.body.scrollHeight - 2;
    upIndicator.classList.toggle('visible', !atTop);
    downIndicator.classList.toggle('visible', !atBottom);
}

window.addEventListener('scroll', updateScrollIndicators);
window.addEventListener('resize', updateScrollIndicators);
// initial
updateScrollIndicators();

const sections = document.querySelectorAll("section");

const observer = new IntersectionObserver(entries => {
    entries.forEach(entry => {
        if (entry.isIntersecting) entry.target.classList.add("show");
    });
}, { threshold: 0.2 });

sections.forEach(section => observer.observe(section));

</script>
